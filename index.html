<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Beat Still</title>
    <style>
      * { margin: 0; padding: 0; }
      body { background: #0a0806; overflow: hidden; }
      canvas { display: block; touch-action: none; }
      #volume-control {
        position: fixed;
        bottom: 16px;
        right: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 1000;
        opacity: 0.4;
        transition: opacity 0.2s;
      }
      #volume-control:hover { opacity: 1; }
      @media (hover: none) {
        #volume-control { opacity: 0.7; }
      }
      #volume-control label {
        font-family: monospace;
        font-size: 13px;
        color: #e8d5b0;
      }
      #volume-slider {
        -webkit-appearance: none;
        width: 100px;
        height: 4px;
        background: #333;
        border-radius: 2px;
        outline: none;
      }
      #volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: #ffaa44;
        border-radius: 50%;
        cursor: pointer;
      }
      #volume-slider::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: #ffaa44;
        border-radius: 50%;
        cursor: pointer;
        border: none;
      }
      #dev-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.92);
        border: 1px solid #ffaa44;
        border-radius: 8px;
        padding: 20px 24px;
        z-index: 2000;
        flex-direction: column;
        gap: 12px;
        min-width: 480px;
        max-height: 80vh;
        overflow-y: auto;
        font-family: monospace;
        color: #ccc;
      }
      .dp-tab-bar {
        display: flex;
        gap: 4px;
        border-bottom: 1px solid #333;
        padding-bottom: 8px;
      }
      .dp-tab {
        background: #111;
        border: 1px solid #333;
        color: #888;
        font-family: monospace;
        font-size: 13px;
        padding: 5px 14px;
        border-radius: 4px 4px 0 0;
        cursor: pointer;
        transition: all 0.15s;
      }
      .dp-tab:hover { color: #e8d5b0; border-color: #555; }
      .dp-tab-active {
        color: #ffaa44;
        border-color: #ffaa44;
        border-bottom-color: transparent;
        background: #1a1510;
      }
      .dp-tab-content {
        display: none;
        padding-top: 8px;
      }
      .dp-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 18px;
        color: #e8d5b0;
        border-bottom: 1px solid #333;
        padding-bottom: 8px;
      }
      .dp-hint { font-size: 12px; color: #666; }
      .dp-section { display: flex; flex-direction: column; gap: 6px; }
      .dp-label { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
      .dp-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
      }
      .dp-row label {
        width: 60px;
        font-size: 14px;
        color: #fff;
        cursor: pointer;
      }
      .dp-desc { font-size: 12px; color: #666; flex: 1; }
      .dp-row input[type="radio"] {
        accent-color: #0ff;
        cursor: pointer;
      }
      .dp-row button, .dp-game-btn {
        background: #111;
        border: 1px solid #444;
        color: #e8d5b0;
        font-family: monospace;
        font-size: 12px;
        padding: 3px 10px;
        border-radius: 4px;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .dp-row button:hover, .dp-game-btn:hover {
        border-color: #ffaa44;
        background: #1a1a1a;
      }
      .dp-game-sounds {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .dp-ctrl-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
        flex-wrap: wrap;
      }
      .dp-ctrl-label {
        font-size: 14px;
        color: #fff;
        min-width: 70px;
      }
      .dp-number-input {
        width: 50px;
        background: #111;
        border: 1px solid #444;
        color: #e8d5b0;
        font-family: monospace;
        font-size: 13px;
        padding: 2px 6px;
        border-radius: 4px;
        text-align: center;
      }
      .dp-number-input:focus {
        outline: none;
        border-color: #ffaa44;
      }
      @media (pointer: coarse) {
        #volume-slider::-webkit-slider-thumb { width: 28px; height: 28px; }
        #volume-slider::-moz-range-thumb { width: 28px; height: 28px; }
        .options-slider::-webkit-slider-thumb { width: 28px; height: 28px; }
        .options-slider::-moz-range-thumb { width: 28px; height: 28px; }
      }
      .options-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        background: rgba(10, 8, 6, 0.95);
        z-index: 5000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        font-family: monospace;
      }
      .options-title {
        font-size: 28px;
        color: #e8d5b0;
        letter-spacing: 4px;
      }
      .options-body {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 90vw;
        max-width: 460px;
      }
      .options-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .options-row-label {
        font-size: 14px;
        color: #998877;
        min-width: 140px;
      }
      .options-segment {
        display: flex;
        gap: 0;
        border: 1px solid #333;
        border-radius: 4px;
        overflow: hidden;
      }
      .options-seg-btn {
        background: #111;
        border: none;
        border-right: 1px solid #333;
        color: #666;
        font-family: monospace;
        font-size: 13px;
        padding: 6px 14px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .options-seg-btn:last-child { border-right: none; }
      .options-seg-btn:hover { color: #e8d5b0; background: #1a1510; }
      .options-seg-btn.active {
        background: #1a1510;
        color: #ffaa44;
      }
      .options-toggle {
        background: #111;
        border: 1px solid #333;
        color: #666;
        font-family: monospace;
        font-size: 13px;
        padding: 6px 20px;
        border-radius: 4px;
        cursor: pointer;
        min-width: 60px;
        transition: all 0.15s;
      }
      .options-toggle:hover { color: #e8d5b0; border-color: #555; }
      .options-toggle.active {
        color: #ffaa44;
        border-color: #ffaa44;
        background: #1a1510;
      }
      .options-slider {
        -webkit-appearance: none;
        width: 140px;
        height: 4px;
        background: #333;
        border-radius: 2px;
        outline: none;
      }
      .options-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: #ffaa44;
        border-radius: 50%;
        cursor: pointer;
      }
      .options-slider::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: #ffaa44;
        border-radius: 50%;
        cursor: pointer;
        border: none;
      }
      .options-slider-val {
        font-size: 13px;
        color: #e8d5b0;
        min-width: 28px;
        text-align: right;
      }
      .options-close-btn {
        background: transparent;
        border: 1px solid #555;
        color: #998877;
        font-family: monospace;
        font-size: 14px;
        padding: 8px 32px;
        border-radius: 4px;
        cursor: pointer;
        letter-spacing: 2px;
        margin-top: 8px;
        transition: border-color 0.2s, color 0.2s;
      }
      .options-close-btn:hover {
        border-color: #ffaa44;
        color: #e8d5b0;
      }
      @media (max-width: 480px) {
        .options-segment { flex-wrap: wrap; }
        .options-seg-btn { flex: 1; min-width: 45px; text-align: center; }
        .options-row { flex-wrap: wrap; gap: 8px; }
      }
    </style>
  </head>
  <body>
    <div id="volume-control">
      <label for="volume-slider">VOL</label>
      <input type="range" id="volume-slider" min="0" max="100" value="70" />
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
